<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Insumos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button onclick="cadastrar()">Cadastrar</button>
</div>

<div id="sistema" style="display:none;">
  <button onclick="logout()">Sair</button>

  <div class="container">
    <h1>Controle de Insumos</h1>

    <label>Insumo</label>
    <input type="text" id="insumo">

    <label>Quantidade</label>
    <input type="number" id="quantidade">

    <label>Postos</label>
    <details>
      <summary>Selecionar postos</summary>
      <div id="postos">
        <label><input type="checkbox" value="Coité"> Coité</label>
        <label><input type="checkbox" value="Salgadalia"> Salgadalia</label>
        <label><input type="checkbox" value="Riachão"> Riachão</label>
        <label><input type="checkbox" value="Nova Fatima"> Nova Fatima</label>
        <label><input type="checkbox" value="Capela"> Capela</label>
        <label><input type="checkbox" value="Cliamo"> Cliamo</label>
        <label><input type="checkbox" value="Retirolandia"> Retirolandia</label>
        <label><input type="checkbox" value="Valente"> Valente</label>
        <label><input type="checkbox" value="CIS S. Luz"> CIS S. Luz</label>
        <label><input type="checkbox" value="M. Isabel S. Luz"> M. Isabel S. Luz</label>
        <label><input type="checkbox" value="Queimadas"> Queimadas</label>
        <label><input type="checkbox" value="Nossa Clínica"> Nossa Clínica</label>
        <label><input type="checkbox" value="Fisiomedic"> Fisiomedic</label>
        <label><input type="checkbox" value="Monte Santo"> Monte Santo</label>
      </div>
    </details>

    <label>Data</label>
    <input type="date" id="data">

    <button onclick="adicionar()">Salvar</button>

    <table>
      <thead>
        <tr>
          <th>Insumo</th>
          <th>Quantidade</th>
          <th>Posto</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
